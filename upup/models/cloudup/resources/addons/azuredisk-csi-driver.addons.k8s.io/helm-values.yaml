# Helm values for azuredisk-csi-driver chart v1.34.0
# To regenerate the manifest:
#   helm repo add azuredisk-csi-driver https://raw.githubusercontent.com/kubernetes-sigs/azuredisk-csi-driver/master/charts
#   cd upup/models/cloudup/resources/addons/azuredisk-csi-driver.addons.k8s.io
#   helm template azuredisk-csi-driver azuredisk-csi-driver/azuredisk-csi-driver \
#     --version 1.34.0 --namespace kube-system -f helm-values.yaml > k8s-1.31.yaml.template
#
# After generating, apply kops-specific patches:
#   1. In the controller azuredisk container, replace AZURE_CREDENTIAL_FILE env var:
#        from: valueFrom: configMapKeyRef: ...
#        to:   value: /etc/kubernetes/cloud.config
#   2. Add readOnly: true to controller azure-cred volume mount
#   3. In the node azuredisk container, remove the AZURE_CREDENTIAL_FILE env var.
#      The node driver does not need cloud config — it uses --get-node-info-from-labels
#      and --allow-empty-cloud-config=true, since cloud.config is only available on
#      control-plane nodes.
#
# Note: StorageClass is managed separately via storage-azure.addons.k8s.io

controller:
  replicas: 1
  runOnControlPlane: true
  hostNetwork: true
  logLevel: 5
  disableAvailabilitySetNodes: true
  vmssCacheTTLInSeconds: 60

linux:
  enabled: true
  hostNetwork: true
  getNodeInfoFromLabels: true

windows:
  enabled: false

snapshot:
  enabled: false

driver:
  userAgentSuffix: "kops"

