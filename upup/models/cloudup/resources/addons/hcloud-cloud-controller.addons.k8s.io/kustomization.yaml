# To regenerate the manifest:
#   cd upup/models/cloudup/resources/addons/hcloud-cloud-controller.addons.k8s.io
#   ./regenerate.sh

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: hcloud-cloud-controller-manager
    repo: https://charts.hetzner.cloud
    version: "1.31.0"
    releaseName: hcloud-cloud-controller-manager
    namespace: kube-system
    valuesFile: helm-values.yaml

patches:
  - target:
      kind: Deployment
      name: hcloud-cloud-controller-manager
    patch: |
      # Chart builds the image from repo/name/tag; replace with the kops template expression.
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: '{{ .ExternalCloudControllerManager.Image }}'
